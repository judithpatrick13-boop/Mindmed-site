<!doctype html>
<html>
<head><meta charset="utf-8"><title>MindMed - Set Password</title>
<style>body{font-family:sans-serif;max-width:420px;margin:60px auto;padding:0 20px}input{width:100%;padding:10px;margin:8px 0;box-sizing:border-box;font-size:16px}button{padding:10px 20px;background:#1e4d3a;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:16px}#msg{margin-top:16px;font-weight:600;word-break:break-word}</style>
</head>
<body>
<h2>Set Your Password</h2>
<p>Paste just the token part from your invite email link (the text after <code>invite_token=</code>), choose a password (6+ characters), and submit.</p>
<input id="token" placeholder="Token">
<input id="password" type="password" placeholder="New password">
<button onclick="submitIt()">Set Password</button>
<p id="msg"></p>
<script>
(function(){
  var h = window.location.hash.replace('#','');
  var params = {};
  h.split('&').forEach(function(p){ var kv = p.split('='); if(kv[0]) params[kv[0]] = decodeURIComponent(kv[1]||''); });
  var token = params['invite_token'] || params['recovery_token'] || params['confirmation_token'] || '';
  if (token) document.getElementById('token').value = token;
})();

function submitIt(){
  var token = document.getElementById('token').value.trim();
  var password = document.getElementById('password').value;
  var msg = document.getElementById('msg');
  if(!token || !password){ msg.style.color='red'; msg.textContent = 'Please fill in both fields.'; return; }
  msg.style.color='black';
  msg.textContent = 'Submitting...';
  fetch('/.netlify/identity/verify', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ token: token, type: 'signup', password: password })
  })
  .then(function(r){ return r.json().then(function(data){ return {status: r.status, data: data}; }); })
  .then(function(res){
    if (res.status === 200) {
      msg.style.color = 'green';
      msg.textContent = 'Success! Password set. Go to /admin/ and log in with your email and this password.';
    } else {
      msg.style.color = 'red';
      msg.textContent = 'Error (' + res.status + '): ' + (res.data.error_description || res.data.msg || JSON.stringify(res.data));
    }
  })
  .catch(function(err){ msg.style.color='red'; msg.textContent = 'Request failed: ' + err.message; });
}
</script>
</body>
</html>
